<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>
  <!-- Glass overlay -->
  <circle cx="16" cy="16" r="15" fill="url(#glass)"/>
  <!-- Grid dots (4x4) representing the link grid -->
  <circle cx="9" cy="9" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="16" cy="9" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="23" cy="9" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="9" cy="16" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="16" cy="16" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="23" cy="16" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="9" cy="23" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="16" cy="23" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="23" cy="23" r="2" fill="rgba(255,255,255,0.8)"/>
  <!-- Subtle border -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
</svg>
