<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    .header {
      padding: 14px 16px 10px;
      background: #fff;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .content {
      padding: 12px 16px;
    }

    .preview {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 10px;
      border: 0.5px solid rgba(0,0,0,0.08);
      margin-bottom: 12px;
    }

    .preview img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
    }

    .preview-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-url {
      font-size: 11px;
      color: #86868b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #86868b;
      margin-bottom: 4px;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.12);
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      color: #1d1d1f;
      margin-bottom: 10px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary {
      background: #007aff;
      color: #fff;
    }

    .btn-primary:hover {
      background: #0066d6;
    }

    .btn-primary:disabled {
      background: #c7c7cc;
      cursor: default;
    }

    .status {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }

    .status.success {
      display: block;
      background: #d1f5d3;
      color: #1a7a2e;
    }

    .status.error {
      display: block;
      background: #fdd;
      color: #c00;
    }

    .setup {
      padding: 16px;
      text-align: center;
    }

    .setup p {
      color: #86868b;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .setup input {
      margin-bottom: 8px;
    }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #86868b;
      text-decoration: none;
    }

    .footer a:hover {
      color: #007aff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Add to Start Page</h1>
  </div>

  <!-- Setup view (no URL configured) -->
  <div id="setup-view" class="setup" style="display:none;">
    <p>Enter your Start Page URL to get started.</p>
    <input type="text" id="setup-url" placeholder="https://yourdomain.com">
    <button class="btn btn-primary" id="setup-save">Save</button>
  </div>

  <!-- Main view -->
  <div id="main-view" class="content" style="display:none;">
    <div class="preview">
      <img id="page-icon" src="" alt="">
      <div class="preview-info">
        <div class="preview-title" id="page-title"></div>
        <div class="preview-url" id="page-url"></div>
      </div>
    </div>

    <label>Name</label>
    <input type="text" id="link-name">

    <label>Group</label>
    <select id="group-select">
      <option value="">Loading groups...</option>
    </select>

    <button class="btn btn-primary" id="add-btn">Add Link</button>
    <div class="status" id="status"></div>
  </div>

  <div class="footer">
    <a href="#" id="change-url">Change Start Page URL</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
